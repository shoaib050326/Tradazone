name: Bundle Size Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  size-check:
    name: Check bundle size limits
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Run size-limit check
        run: |
          pnpm size --json 2>&1 || true

      - name: Analyze bundle sizes
        run: |
          echo "📦 Bundle Size Report"
          echo "====================="

          # Find and display chunk sizes
          if [ -d "dist/assets" ]; then
            echo ""
            echo "Individual chunk sizes:"
            ls -lh dist/assets/*.js 2>/dev/null | awk '{print $5, $9}' || echo "No JS chunks found"
            
            # Check DataContext chunk specifically
            echo ""
            echo "DataContext chunk:"
            ls -lh dist/assets/*data-context*.js 2>/dev/null || echo "No data-context chunk found"
          fi

          # Check total dist size
          echo ""
          echo "Total dist size:"
          du -sh dist/ 2>/dev/null || echo "No dist folder"
        shell: bash

      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-report
          path: |
            dist/
            size-limit.json

      - name: Fail if size limits exceeded
        run: |
          # Check if size-limit reported any errors
          RESULT=$(pnpm size --json 2>&1 || true)
          if echo "$RESULT" | grep -q "Error"; then
            echo "❌ Bundle size limits exceeded!"
            echo "$RESULT"
            exit 1
          fi
          echo "✅ Bundle size check passed"
          echo "$RESULT"
        shell: bash
