name: Lint README

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    paths:
      - 'README.md'

permissions:
  contents: read

jobs:
  lint-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint README (doctoc)
        run: npm run lint:readme
        continue-on-error: true